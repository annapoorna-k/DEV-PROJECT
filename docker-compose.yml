version: '3.9'

services:

  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: studentdb

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

  student-api:
    build: .
    container_name: student-api

    ports:
      - "8000:8000"

    env_file:
      - .env

    depends_on:
      - mysql

    restart: always

volumes:
  mysql_data:
